name: BFV Scouting Automation

on:
  schedule:
    # Laeuft jeden Montag um 08:00 Uhr (UTC)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Erlaubt manuelles Ausloesen im Browser (fuer Tests)

jobs:
  run-scouting:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        
      - name: Python 3.10 aufsetzen
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Beschleunigt zukuenftige Ausfuehrungen extrem
          
      - name: Chrome und ChromeDriver installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scouting-Generator ausfuehren (Scrapen, KI-Fazit, PDFs, Mails)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
        run: |
          python main.py --scrape --send-emails
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Scraping-Ergebnis pruefen
        run: |
          echo "Gescrapte CSV-Dateien:"
          ls -lh data/bfv_scraped_*.csv 2>/dev/null || echo "WARNUNG: Keine gescrapten Daten gefunden – Fallback auf alte CSV!"

      - name: Reports als Artifact hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scouting-reports-${{ github.run_number }}
          path: output/
          retention-days: 30
