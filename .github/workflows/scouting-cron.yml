name: BFV Scouting Automation

on:
  schedule:
    # Laeuft jeden Montag um 08:00 Uhr (UTC)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Erlaubt manuelles Ausloesen im Browser (fuer Tests)

jobs:
  run-scouting:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        
      - name: Python 3.10 aufsetzen
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Beschleunigt zukuenftige Ausfuehrungen extrem
          
      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Scouting-Generator ausfuehren (Scrapen, KI-Fazit, PDFs, Mails)
        env:
          # Wir injizieren hier sicher deine GitHub-Secrets!
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCOUTING_EMAIL_PW: ${{ secrets.SCOUTING_EMAIL_PW }}
        run: |
          # Fuehrt das Skript vollumfaenglich aus
          python main.py --scrape --send-emails
